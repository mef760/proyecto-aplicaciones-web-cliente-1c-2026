<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - La Buena Mesa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="auth.js"></script>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <a href="index.html" class="logo">La Buena Mesa</a>
        <button class="nav-toggle" aria-label="Menú">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="nav-links">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="#">Menú</a></li>
          <li><a href="#">Contacto</a></li>
          <li>
            <a href="agregar-plato.html" class="nav-link-primary"
              >Agregar plato</a
            >
          </li>
        </ul>
      </div>
    </nav>
    <script type="module">
      import { initAuthNav } from './auth.js'
      initAuthNav()
    </script>

    <main class="checkout-page">
      <div class="checkout-container">
        <a href="index.html" class="back-link">
          ← Volver al menú
        </a>

        <h1>Finalizar Pedido</h1>

        <div class="checkout-grid">
          <div class="checkout-summary">
            <h2>Tu Pedido</h2>
            <div class="checkout-items" id="checkout-items">
            </div>
            <div class="checkout-total">
              <span>Total:</span>
              <span class="total-amount" id="checkout-total">$0.00</span>
            </div>
          </div>

          <div class="checkout-form-section">
            <h2>Datos de Entrega</h2>
            <form class="checkout-form" id="checkout-form">
              <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input
                  type="text"
                  id="nombre"
                  name="nombre"
                  placeholder="Juan Pérez"
                  required
                />
              </div>

              <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input
                  type="tel"
                  id="telefono"
                  name="telefono"
                  placeholder="+54 11 1234-5678"
                  required
                />
              </div>

              <div class="form-group">
                <label for="direccion">Dirección de entrega</label>
                <input
                  type="text"
                  id="direccion"
                  name="direccion"
                  placeholder="Calle 123, Apartamento 4B"
                  required
                />
              </div>

              <div class="form-group">
                <label for="notas">Notas adicionales (opcional)</label>
                <textarea
                  id="notas"
                  name="notas"
                  placeholder="Instrucciones especiales para la entrega..."
                ></textarea>
              </div>

              <h2>Método de Pago</h2>
              
              <div class="payment-methods">
                <label class="payment-option">
                  <input type="radio" name="pago" value="efectivo" checked />
                  <span class="payment-icon">💵</span>
                  <span>Efectivo</span>
                </label>
                <label class="payment-option">
                  <input type="radio" name="pago" value="tarjeta" />
                  <span class="payment-icon">💳</span>
                  <span>Tarjeta</span>
                </label>
                <label class="payment-option">
                  <input type="radio" name="pago" value="transferencia" />
                  <span class="payment-icon">🏦</span>
                  <span>Transferencia</span>
                </label>
              </div>

              <button type="submit" class="btn btn-primary btn-checkout">
                Confirmar Pedido
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="checkout.js"></script>
  </body>
</html>
